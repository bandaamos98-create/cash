<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactus Money Transfers • Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .modal { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .blink-red { animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { color: #ef4444; } 50% { color: #f87171; } }
        .live-clock { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-gray-950 text-white">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-900 to-gray-950">
        <div class="max-w-md w-full bg-gray-900 rounded-3xl shadow-2xl p-8">
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🌵</div>
                <h1 class="text-4xl font-bold">Cactus</h1>
            </div>
            <p class="text-center text-emerald-400 text-xl mb-8">Western Union • Staff Portal</p>
           
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Username / Employee ID</label>
                    <input id="username" type="text" value="amos01" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input id="password" type="password" value="1234" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <button onclick="handleLogin()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg">SIGN IN</button>
                <p class="text-center text-xs text-gray-500 mt-4">Demo: amos01 / 1234</p>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden min-h-screen">
        <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
            <div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">🌵</div>
                    <div>
                        <h1 class="text-2xl font-bold">Cactus Money Transfers</h1>
                        <p class="text-xs text-emerald-400">Western Union • Cash Position Tracking</p>
                    </div>
                </div>
                <div class="flex items-center gap-8">
                    <div id="liveClock" class="live-clock text-xl font-mono bg-gray-800 px-5 py-2 rounded-2xl text-emerald-400"></div>
                    <div id="userInfo" class="flex items-center gap-3"></div>
                    <button onclick="logout()" class="flex items-center gap-2 text-gray-400 hover:text-white">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-8 py-8">
            <!-- CASHIER VIEW -->
            <div id="cashierView" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-semibold">Welcome FLAs</h2>
                        <p id="cashierBranch" class="text-emerald-400 text-lg"></p>
                    </div>
                    <button onclick="openEndDayModal()" class="flex items-center gap-3 bg-amber-500 hover:bg-amber-600 px-8 py-4 rounded-3xl font-semibold text-lg shadow-xl">
                        <i class="fa-solid fa-flag-checkered"></i> END DAY REPORT
                    </button>
                </div>

                <div class="bg-gray-900 rounded-3xl p-8 mb-8">
                    <h3 class="text-xl font-semibold mb-6">Today's Cash Positions</h3>
                    <div id="todayReports" class="grid grid-cols-6 gap-4"></div>
                </div>

                <div class="bg-gray-900 rounded-3xl p-8">
                    <h3 class="text-xl font-semibold mb-6">Submit Cash Position</h3>
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-medium mb-3">Time Slot</label>
                            <div id="timeButtons" class="grid grid-cols-6 gap-3"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-3">Cash at Hand (ZMW)</label>
                            <div class="relative">
                                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-3xl text-gray-400">K</span>
                                <input id="cashAmount" type="number" step="0.01" placeholder="0.00" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-14 py-6 text-4xl font-medium focus:outline-none focus:border-emerald-500">
                            </div>
                            <button onclick="submitReport()" id="submitBtn" disabled class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-2xl font-semibold text-xl flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> SUBMIT NOW
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MANAGER VIEW -->
            <div id="managerView" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-semibold">Management Dashboard - All Branches</h2>
                    <select id="monthSelector" onchange="renderManagerDashboard()" class="bg-gray-800 border border-gray-700 rounded-2xl px-5 py-3 text-white"></select>
                </div>
                <div id="managerDashboard" class="space-y-10"></div>
            </div>
        </div>
    </div>

    <!-- END DAY REPORT MODAL -->
    <div id="endDayModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="modal bg-gray-900 rounded-3xl w-full max-w-7xl max-h-[95vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <p class="text-amber-400 font-medium">End of Day Report</p>
                    <p id="endDayBranch" class="text-3xl font-semibold"></p>
                </div>
                <button onclick="closeEndDayModal()" class="text-4xl text-gray-400 hover:text-white">&times;</button>
            </div>
            
            <div class="flex-1 p-8 overflow-auto" id="endDayContent"></div>
            
            <div class="p-6 border-t border-gray-700 bg-gray-950 flex justify-end gap-4">
                <button onclick="closeEndDayModal()" class="px-8 py-4 text-gray-400 hover:text-white">Cancel</button>
                <button onclick="submitEndDayReport()" class="bg-emerald-500 hover:bg-emerald-600 px-10 py-4 rounded-3xl font-semibold">SUBMIT END DAY REPORT</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let reportsDB = [];
        let endDayReports = [];

        const staffDB = {
            "amos01": { password: "1234", role: "cashier", fullName: "Amos Banda", branch: "Kabwe Main" },
            "manager": { password: "1234", role: "manager", fullName: "Management", branch: "Head Office" }
        };

        const reportTimes = [
            { label: "Opening", time: "08:00", key: "opening" },
            { label: "10:00 hrs", time: "10:00", key: "10hrs" },
            { label: "12:00 hrs", time: "12:00", key: "12hrs" },
            { label: "14:00 hrs", time: "14:00", key: "14hrs" },
            { label: "16:00 hrs", time: "16:00", key: "16hrs" },
            { label: "Closing", time: "17:30", key: "closing" }
        ];

        const otherServices = ["ZOONA", "AIRTEL MONEY", "ZAMTEL MONEY", "MTN MONEY", "MTN BULK", "AIRTEL BULK", "ZANACO", "INDO", "FNB"];

        function getToday() { return new Date().toISOString().split('T')[0]; }

        function saveReports() {
            localStorage.setItem('cactusReports', JSON.stringify(reportsDB));
            localStorage.setItem('cactusEndDayReports', JSON.stringify(endDayReports));
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            if (staffDB[username] && staffDB[username].password === password) {
                currentUser = { username, ...staffDB[username] };
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                renderApp();
            } else {
                alert("Invalid credentials.\nDemo: amos01 / 1234");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
        }

        function renderUserInfo() {
            document.getElementById('userInfo').innerHTML = `
                <div class="bg-gray-800 rounded-3xl px-5 py-2 flex items-center gap-3">
                    <div class="text-emerald-400">🌵</div>
                    <div>
                        <p class="font-semibold">${currentUser.fullName}</p>
                        <p class="text-xs text-gray-400">${currentUser.branch}</p>
                    </div>
                </div>
            `;
        }

        function startLiveClock() {
            const clockEl = document.getElementById('liveClock');
            setInterval(() => {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);
        }

        function renderCashierView() {
            document.getElementById('cashierView').classList.remove('hidden');
            document.getElementById('managerView').classList.add('hidden');
            document.getElementById('cashierBranch').textContent = currentUser.branch;
            renderTimeButtons();
            renderTodayReports();
        }

        function renderTimeButtons() {
            const container = document.getElementById('timeButtons');
            container.innerHTML = '';
            const today = getToday();
            reportTimes.forEach(slot => {
                const alreadySubmitted = reportsDB.some(r => r.date === today && r.username === currentUser.username && r.timeKey === slot.key);
                const btn = document.createElement('button');
                btn.className = `p-5 rounded-2xl border-2 text-center transition-all flex-1 ${alreadySubmitted ? 'border-emerald-600 bg-emerald-950/30 line-through opacity-75 cursor-not-allowed' : 'border-emerald-400 hover:border-emerald-500 hover:bg-emerald-950'}`;
                btn.innerHTML = `<p class="font-medium">${slot.label}</p><p class="text-xs mt-1">${slot.time}</p>`;
                btn.disabled = alreadySubmitted;
                btn.onclick = () => selectTime(slot.key, btn);
                container.appendChild(btn);
            });
        }

        let selectedTimeKey = null;
        function selectTime(key, btnElement) {
            selectedTimeKey = key;
            document.querySelectorAll('#timeButtons button').forEach(b => b.classList.remove('ring-2', 'ring-emerald-500'));
            btnElement.classList.add('ring-2', 'ring-emerald-500');
            document.getElementById('submitBtn').disabled = false;
        }

        function submitReport() {
            if (!selectedTimeKey) return alert("Please select a time slot");
            const amountStr = document.getElementById('cashAmount').value.trim();
            if (!amountStr) return alert("Please enter the cash amount");
            const amount = parseFloat(amountStr);
            if (isNaN(amount)) return alert("Please enter a valid number");

            const today = getToday();
            const slot = reportTimes.find(t => t.key === selectedTimeKey);

            reportsDB = reportsDB.filter(r => !(r.date === today && r.username === currentUser.username && r.timeKey === selectedTimeKey));
            reportsDB.unshift({
                id: Date.now(),
                date: today,
                username: currentUser.username,
                fullName: currentUser.fullName,
                branch: currentUser.branch,
                timeKey: selectedTimeKey,
                time: slot.time,
                label: slot.label,
                amount: amount,
                submittedAt: new Date().toISOString()
            });

            saveReports();
            renderTimeButtons();
            renderTodayReports();
            document.getElementById('cashAmount').value = '';
            selectedTimeKey = null;
            document.getElementById('submitBtn').disabled = true;
            alert(`✅ ${slot.label} submitted successfully!`);
        }

        function renderTodayReports() {
            const today = getToday();
            const container = document.getElementById('todayReports');
            container.innerHTML = '';
            reportTimes.forEach(slot => {
                const report = reportsDB.find(r => r.date === today && r.username === currentUser.username && r.timeKey === slot.key);
                const amount = report ? report.amount : 0.00;
                const submittedTime = report ? new Date(report.submittedAt).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}) : 'Not submitted';
                const div = document.createElement('div');
                div.className = `rounded-3xl p-6 text-center ${report ? 'bg-emerald-900/30 border border-emerald-500' : 'bg-gray-800'}`;
                div.innerHTML = `
                    <p class="text-emerald-400 text-sm">${slot.label}</p>
                    <p class="text-4xl font-semibold mt-3">${amount.toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                    <p class="text-xs text-gray-400 mt-1">ZMW</p>
                    <p class="text-[10px] text-gray-500 mt-2">Submitted: ${submittedTime}</p>
                `;
                container.appendChild(div);
            });
        }

        // ===================== END DAY REPORT =====================
        function openEndDayModal() {
            if (currentUser.role !== 'cashier') return alert("Only cashiers can submit End Day reports.");

            const today = getToday();
            document.getElementById('endDayBranch').textContent = `${currentUser.branch} • ${today}`;

            const content = document.getElementById('endDayContent');
            content.innerHTML = `
                <div class="space-y-12">

                    <!-- WESTERN UNION -->
                    <div class="bg-gray-800 rounded-3xl p-8">
                        <h3 class="text-2xl font-bold mb-8 text-amber-400">WESTERN UNION</h3>
                        
                        <div class="grid grid-cols-2 gap-10">
                            <div class="space-y-8">
                                <div>
                                    <label class="block text-sm font-medium mb-2">OPENING BALANCE</label>
                                    <div class="relative">
                                        <span class="absolute left-6 top-1/2 -translate-y-1/2 text-4xl text-gray-400">K</span>
                                        <input id="wu_opening" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="w-full bg-gray-900 border border-gray-700 rounded-3xl pl-14 py-7 text-4xl font-medium">
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-lg font-semibold mb-4 text-emerald-400">SENT</label>
                                    <div class="space-y-4">
                                        <div class="flex gap-4"><span class="w-52">From Bank</span><input id="sent_bank" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                        <div class="flex gap-4"><span class="w-52">From Counter 1</span><input id="sent_c1" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                        <div class="flex gap-4"><span class="w-52">From Counter 2</span><input id="sent_c2" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                        <div class="flex gap-4"><span class="w-52">From Counter 4</span><input id="sent_c4" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                        <div class="flex gap-4"><span class="w-52">From Zanaco</span><input id="sent_zanaco" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-lg font-semibold mb-4 text-red-400">PAID</label>
                                <div class="space-y-4">
                                    <div class="flex gap-4"><span class="w-52">To Counter 2</span><input id="paid_c2" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">To Counter 3</span><input id="paid_c3" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">To Bank</span><input id="paid_bank" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">Petty Cash</span><input id="petty_cash" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">Polish</span><input id="polish" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">Sugar</span><input id="sugar" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">Taxi</span><input id="taxi" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                    <div class="flex gap-4"><span class="w-52">To Airtel</span><input id="to_airtel" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="flex-1 bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-10 pt-8 border-t border-gray-700 flex justify-between items-center text-3xl font-bold">
                            <span>CLOSING BALANCE</span>
                            <span id="wu_closing" class="text-emerald-400">0.00</span>
                        </div>
                    </div>

                    <!-- OTHER SERVICES -->
                    <div>
                        <h3 class="text-2xl font-bold mb-6">OTHER SERVICES</h3>
                        <div id="otherServicesContainer" class="grid grid-cols-3 gap-6"></div>
                    </div>
                </div>
            `;

            let html = '';
            otherServices.forEach(svc => {
                const key = svc.toLowerCase().replace(/ /g, '');
                html += `
                    <div class="bg-gray-800 rounded-3xl p-6">
                        <h4 class="font-semibold mb-5 text-lg">${svc}</h4>
                        <div class="space-y-5">
                            <div><label class="block text-xs text-emerald-400 mb-1">SENT</label><input id="sent_${key}" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">FROM WESTERN UNION</label><input id="from_wu_${key}" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                            <div><label class="block text-xs text-red-400 mb-1">PAID</label><input id="paid_${key}" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                            <div><label class="block text-xs text-red-400 mb-1">TO WESTERN UNION</label><input id="to_wu_${key}" type="number" step="0.01" value="0" oninput="calculateEndDay()" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 text-right"></div>
                        </div>
                    </div>`;
            });
            document.getElementById('otherServicesContainer').innerHTML = html;

            calculateEndDay();
            document.getElementById('endDayModal').classList.remove('hidden');
        }

        function calculateEndDay() {
            let opening = parseFloat(document.getElementById('wu_opening').value) || 0;
            let sent = (parseFloat(document.getElementById('sent_bank').value)||0) + (parseFloat(document.getElementById('sent_c1').value)||0) + 
                       (parseFloat(document.getElementById('sent_c2').value)||0) + (parseFloat(document.getElementById('sent_c4').value)||0) + 
                       (parseFloat(document.getElementById('sent_zanaco').value)||0);
            let paid = (parseFloat(document.getElementById('paid_c2').value)||0) + (parseFloat(document.getElementById('paid_c3').value)||0) + 
                       (parseFloat(document.getElementById('paid_bank').value)||0) + (parseFloat(document.getElementById('petty_cash').value)||0) + 
                       (parseFloat(document.getElementById('polish').value)||0) + (parseFloat(document.getElementById('sugar').value)||0) + 
                       (parseFloat(document.getElementById('taxi').value)||0) + (parseFloat(document.getElementById('to_airtel').value)||0);

            let closing = opening + sent - paid;
            document.getElementById('wu_closing').textContent = closing.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function closeEndDayModal() {
            document.getElementById('endDayModal').classList.add('hidden');
        }

        function submitEndDayReport() {
            alert("✅ End Day Report Submitted Successfully!\nWestern Union Closing Balance has been auto-calculated.");
            closeEndDayModal();
        }

        function renderManagerDashboard() {
            document.getElementById('managerView').classList.remove('hidden');
            document.getElementById('cashierView').classList.add('hidden');
            document.getElementById('managerDashboard').innerHTML = `<div class="text-center py-20 text-gray-400 text-xl">Manager Dashboard - End Day Reports will appear here soon.</div>`;
        }

        function renderApp() {
            renderUserInfo();
            startLiveClock();
            if (currentUser.role === 'cashier') renderCashierView();
            else renderManagerDashboard();
        }

        window.onload = () => {
            reportsDB = [];
            endDayReports = [];
            saveReports();
        };
    </script>
</body>
</html>
